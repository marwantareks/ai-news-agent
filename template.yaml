AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AI News Agent — daily Lambda that searches, curates, and emails an AI learning digest.

Parameters:
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: Anthropic API key for Claude Haiku

  TavilyApiKey:
    Type: String
    NoEcho: true
    Description: Tavily search API key

  EmailTo:
    Type: String
    Default: ""
    Description: Recipient email address (must be SES-verified in sandbox mode)

  EmailFrom:
    Type: String
    Default: ""
    Description: Sender email address (must be SES-verified identity)

Globals:
  Function:
    Runtime: python3.12
    Timeout: 300
    MemorySize: 256
    Environment:
      Variables:
        ANTHROPIC_API_KEY: !Ref AnthropicApiKey
        TAVILY_API_KEY: !Ref TavilyApiKey
        EMAIL_TO: !Ref EmailTo
        EMAIL_FROM: !Ref EmailFrom
        S3_BUCKET: !Ref ReportsBucket
        SES_REGION: us-east-1

Resources:

  # ── S3 bucket for HTML reports ──────────────────────────────────────────────
  ReportsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "ai-news-agent-reports-${AWS::AccountId}"
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldReports
            Status: Enabled
            ExpirationInDays: 90

  # ── IAM execution role ───────────────────────────────────────────────────────
  AgentExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ai-news-agent-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AgentS3SesAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub "arn:aws:s3:::ai-news-agent-reports-${AWS::AccountId}/*"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !Sub "arn:aws:s3:::ai-news-agent-reports-${AWS::AccountId}"
              - Effect: Allow
                Action:
                  - ses:SendRawEmail
                Resource:
                  - !Sub "arn:aws:ses:us-east-1:${AWS::AccountId}:identity/${EmailFrom}"
                  - !Sub "arn:aws:ses:us-east-1:${AWS::AccountId}:identity/${EmailTo}"

  # ── Lambda function ──────────────────────────────────────────────────────────
  AgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ai-news-agent
      Handler: agent.lambda_handler
      CodeUri: .
      Role: !GetAtt AgentExecutionRole.Arn
      Events:
        WeeklySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 3 ? * TUE,FRI *)
            Name: ai-news-agent-weekly
            Description: Run AI news agent on Tuesdays and Fridays at 03:00 UTC
            Enabled: true

Outputs:
  ReportsBucketName:
    Description: S3 bucket where HTML reports are stored
    Value: !Ref ReportsBucket

  AgentFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt AgentFunction.Arn

  AgentFunctionName:
    Description: Lambda function name
    Value: !Ref AgentFunction
