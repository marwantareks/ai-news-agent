AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AI Learning Digest Agent — biweekly Lambda that searches, curates, and emails an AI learning digest.

Parameters:
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: Anthropic API key for Claude Haiku

  TavilyApiKey:
    Type: String
    NoEcho: true
    Description: Tavily search API key

  EmailFrom:
    Type: String
    Default: ""
    Description: Sender email address (must be on a Resend-verified domain)

  ResendApiKey:
    Type: String
    NoEcho: true
    Description: Resend API key for email delivery

  ResendAudienceId:
    Type: String
    Default: ""
    Description: Resend Audience ID for newsletter subscribers

Globals:
  HttpApi:
    DefaultRouteSettings:
      ThrottlingBurstLimit: 20
      ThrottlingRateLimit: 10
  Function:
    Runtime: python3.12
    Timeout: 300
    MemorySize: 256
    Environment:
      Variables:
        ANTHROPIC_API_KEY: !Ref AnthropicApiKey
        TAVILY_API_KEY: !Ref TavilyApiKey
        EMAIL_FROM: !Ref EmailFrom
        S3_BUCKET: !Ref ReportsBucket
        RESEND_API_KEY: !Ref ResendApiKey
        RESEND_AUDIENCE_ID: !Ref ResendAudienceId
        SIGNUP_PAGE_URL: !Sub "http://ai-news-agent-signup-${AWS::AccountId}.s3-website-${AWS::Region}.amazonaws.com"

Resources:

  # ── S3 bucket for HTML reports ──────────────────────────────────────────────
  ReportsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "ai-news-agent-reports-${AWS::AccountId}"
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldReports
            Status: Enabled
            ExpirationInDays: 90

  # ── IAM execution role ───────────────────────────────────────────────────────
  AgentExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ai-news-agent-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AgentS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub "arn:aws:s3:::ai-news-agent-reports-${AWS::AccountId}/*"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !Sub "arn:aws:s3:::ai-news-agent-reports-${AWS::AccountId}"

  # ── Main agent Lambda ────────────────────────────────────────────────────────
  AgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ai-news-agent
      Handler: agent.lambda_handler
      CodeUri: .
      Role: !GetAtt AgentExecutionRole.Arn
      Events:
        WeeklySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 3 ? * TUE,FRI *)
            Name: ai-news-agent-weekly
            Description: Run AI news agent on Tuesdays and Fridays at 03:00 UTC
            Enabled: true

  # ── Signup Lambda + HTTP API ─────────────────────────────────────────────────
  SignupFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ai-news-agent-signup
      Handler: signup/handler.handler
      CodeUri: .
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          SIGNUP_ALLOWED_ORIGIN: !Sub "http://ai-news-agent-signup-${AWS::AccountId}.s3-website-${AWS::Region}.amazonaws.com"
      Events:
        SignupPost:
          Type: HttpApi
          Properties:
            Path: /subscribe
            Method: POST
        SignupOptions:
          Type: HttpApi
          Properties:
            Path: /subscribe
            Method: OPTIONS
        UnsubscribePost:
          Type: HttpApi
          Properties:
            Path: /unsubscribe
            Method: POST
        UnsubscribeOptions:
          Type: HttpApi
          Properties:
            Path: /unsubscribe
            Method: OPTIONS
        ConfirmGet:
          Type: HttpApi
          Properties:
            Path: /confirm
            Method: GET
        ConfirmOptions:
          Type: HttpApi
          Properties:
            Path: /confirm
            Method: OPTIONS

  # ── S3 bucket for signup page ────────────────────────────────────────────────
  SignupBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "ai-news-agent-signup-${AWS::AccountId}"
      WebsiteConfiguration:
        IndexDocument: subscribe.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  SignupBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SignupBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${SignupBucket}/*"

Outputs:
  ReportsBucketName:
    Description: S3 bucket where HTML reports are stored
    Value: !Ref ReportsBucket

  AgentFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt AgentFunction.Arn

  AgentFunctionName:
    Description: Lambda function name
    Value: !Ref AgentFunction

  SignupApiUrl:
    Description: Signup endpoint URL
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/subscribe"

  SignupPageUrl:
    Description: Public signup page URL
    Value: !Sub "http://ai-news-agent-signup-${AWS::AccountId}.s3-website-${AWS::Region}.amazonaws.com"

  UnsubscribeApiUrl:
    Description: Unsubscribe endpoint URL
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/unsubscribe"
